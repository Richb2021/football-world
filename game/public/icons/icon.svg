<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Shield outer gold -->
  <path d="M100 8 L186 44 L186 128 Q186 182 100 212 Q14 182 14 128 L14 44 Z"
        fill="#1a1a0e" stroke="#ffd400" stroke-width="7" stroke-linejoin="round"/>
  <!-- Shield inner gold line -->
  <path d="M100 20 L174 52 L174 128 Q174 174 100 200 Q26 174 26 128 L26 52 Z"
        fill="none" stroke="#ffd400" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Soccer ball centred at 100,118, radius 52 -->
  <!-- White base -->
  <circle cx="100" cy="118" r="52" fill="#f0ede4" stroke="#1a1208" stroke-width="2.5"/>

  <!-- Black pentagons - classic ball pattern -->
  <!-- Centre top pentagon -->
  <polygon points="100,72 111,80 107,93 93,93 89,80"
           fill="#1a1208" stroke="#1a1208" stroke-width="1"/>
  <!-- Top-left pentagon -->
  <polygon points="73,85 84,80 89,93 80,102 68,97"
           fill="#1a1208" stroke="#1a1208" stroke-width="1"/>
  <!-- Top-right pentagon -->
  <polygon points="127,85 116,80 111,93 120,102 132,97"
           fill="#1a1208" stroke="#1a1208" stroke-width="1"/>
  <!-- Bottom-left pentagon -->
  <polygon points="68,137 80,132 89,143 84,156 70,154"
           fill="#1a1208" stroke="#1a1208" stroke-width="1"/>
  <!-- Bottom-right pentagon -->
  <polygon points="132,137 120,132 111,143 116,156 130,154"
           fill="#1a1208" stroke="#1a1208" stroke-width="1"/>
  <!-- Bottom-centre pentagon -->
  <polygon points="100,162 111,156 107,143 93,143 89,156"
           fill="#1a1208" stroke="#1a1208" stroke-width="1"/>

  <!-- Ball outline clip -->
  <circle cx="100" cy="118" r="52" fill="none" stroke="#1a1208" stroke-width="2.5"/>

  <!-- Subtle shine -->
  <ellipse cx="84" cy="97" rx="12" ry="8" fill="white" opacity="0.18" transform="rotate(-20,84,97)"/>
</svg>
